name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Rename APK for Release
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Oflix-Debug.apk

    - name: Create or Update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Oflix App Latest Build
        body: |
          ### Oflix Android App Build
          
          Ini adalah build otomatis terbaru dari kode Anda.
          * **Commit SHA:** `${{ github.sha }}`
          * **Tanggal Build:** `${{ github.event.head_commit.timestamp || github.event.commits[0].timestamp }}`
          
          Unduh file APK langsung di bawah ini tanpa dibungkus ZIP.
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/Oflix-Debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
