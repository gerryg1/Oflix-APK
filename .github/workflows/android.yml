name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

    - name: Build Release APK
      env:
        KEYSTORE_PATH: "release.keystore"
        KEYSTORE_PASSWORD: "${{ secrets.KEYSTORE_PASSWORD }}"
        KEY_ALIAS: "${{ secrets.KEY_ALIAS }}"
        KEY_PASSWORD: "${{ secrets.KEY_PASSWORD }}"
      run: ./gradlew assembleRelease

    - name: Create or Update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Oflix App Latest Build
        body: |
          ### Oflix Android App Build
          
          Ini adalah build otomatis terbaru dari kode Anda.
          * **Commit SHA:** `${{ github.sha }}`
          * **Tanggal Build:** `${{ github.event.head_commit.timestamp || github.event.commits[0].timestamp }}`
          
          Unduh file APK langsung di bawah ini tanpa dibungkus ZIP.
        draft: false
        prerelease: false
        files: app/build/outputs/apk/release/Oflix-v1.1-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
